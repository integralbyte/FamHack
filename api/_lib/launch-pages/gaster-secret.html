<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>What Are You Looking For? | FamHack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --text: #b30000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      font-family: "Times New Roman", Georgia, serif;
      color: var(--text);
    }

    main {
      width: 100vw;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #000;
    }

    .stage {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 18px;
      text-align: center;
    }

    .prompt {
      margin: 0;
      color: var(--text);
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.08;
      letter-spacing: 0.04em;
      text-shadow: 0 0 24px rgba(179, 0, 0, 0.28);
    }

    .gaster-image {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 900ms ease, transform 900ms ease;
      pointer-events: none;
    }

    .gaster-image.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gaster-image img {
      display: block;
      width: min(420px, 72vw);
      max-width: 100%;
      height: auto;
      image-rendering: auto;
    }
  </style>
</head>

<body>
  <main>
    <div class="stage">
      <p class="prompt">What are you looking for?</p>
      <div class="gaster-image" id="gaster-image" hidden aria-hidden="true">
        <img src="/whatareyoulookingfor.png" alt="Gaster" id="gaster-image-asset" />
      </div>
    </div>
  </main>

  <script>
    const undertaleName = window.location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase();
    const shouldShowGaster = undertaleName === 'gaster';
    const gasterImage = document.getElementById('gaster-image');
    const gasterImageAsset = document.getElementById('gaster-image-asset');

    if (shouldShowGaster && gasterImage) {
      window.setTimeout(() => {
        gasterImage.hidden = false;
        gasterImage.setAttribute('aria-hidden', 'false');
        window.requestAnimationFrame(() => {
          gasterImage.classList.add('is-visible');
        });
      }, 1500);
    }

    if (gasterImageAsset && !gasterImageAsset.complete) {
      gasterImageAsset.addEventListener('load', () => {
        if (shouldShowGaster) {
          window.requestAnimationFrame(() => {
            gasterImage.classList.add('is-visible');
          });
        }
      }, { once: true });
    }
  </script>
</body>

</html>
