<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>What Are You Looking For? | FamHack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --text: #b30000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    main {
      width: 100vw;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #000;
    }

    .stage {
      display: grid;
      place-items: center;
      text-align: center;
      width: 100%;
      height: 100%;
    }

    .stage > * {
      grid-area: 1 / 1;
    }

    .prompt {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      font-size: clamp(1.05rem, 2.4vw, 1.7rem);
      line-height: 1.08;
      letter-spacing: 0.04em;
      text-shadow: 0 0 24px rgba(179, 0, 0, 0.28);
      opacity: 1;
      transition: opacity 1000ms ease;
      min-height: 1.2em;
    }

    .prompt.is-fading-out {
      opacity: 0;
    }

    .gaster-image {
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 700ms ease, transform 700ms ease;
      pointer-events: none;
    }

    .gaster-image.is-visible {
      opacity: 1;
      transform: scale(1);
    }

    .gaster-image img {
      display: block;
      width: min(180px, 28vw);
      max-width: 100%;
      height: auto;
      image-rendering: auto;
    }
  </style>
</head>

<body>
  <main>
    <div class="stage">
      <p class="prompt" id="prompt"></p>
      <div class="gaster-image" id="gaster-image" hidden aria-hidden="true">
        <img src="/whatareyoulookingfor.png" alt="Gaster" id="gaster-image-asset" />
      </div>
    </div>
  </main>

  <script>
    const promptText = 'What are you looking for?';
    const undertaleName = window.location.pathname.replace(/^\/+|\/+$/g, '').toLowerCase();
    const shouldShowGaster = undertaleName === 'gaster';
    const prompt = document.getElementById('prompt');
    const gasterImage = document.getElementById('gaster-image');
    const gasterImageAsset = document.getElementById('gaster-image-asset');

    function showGasterImage() {
      if (!gasterImage) {
        return;
      }

      gasterImage.hidden = false;
      gasterImage.setAttribute('aria-hidden', 'false');
      window.requestAnimationFrame(() => {
        gasterImage.classList.add('is-visible');
      });
    }

    function typePrompt(text, { charDelay = 50, onComplete } = {}) {
      if (!prompt) {
        return;
      }

      prompt.textContent = '';
      let index = 0;

      function tick() {
        prompt.textContent += text.charAt(index);
        index += 1;

        if (index < text.length) {
          window.setTimeout(tick, charDelay);
          return;
        }

        if (typeof onComplete === 'function') {
          onComplete();
        }
      }

      if (!text) {
        if (typeof onComplete === 'function') {
          onComplete();
        }
        return;
      }

      tick();
    }

    if (prompt) {
      typePrompt(promptText, {
        onComplete: shouldShowGaster ? () => {
          window.setTimeout(() => {
            prompt.classList.add('is-fading-out');
          }, 220);

          window.setTimeout(() => {
            showGasterImage();
          }, 1220);
        } : undefined,
      });
    }

  </script>
</body>

</html>
