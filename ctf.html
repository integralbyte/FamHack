<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>CTF | FamHack</title>
  <meta content="Solve the FamHack CTF and track your individual run on the leaderboard." name="description" />
  <meta content="CTF | FamHack" property="og:title" />
  <meta content="Solve the FamHack CTF and track your individual run on the leaderboard." property="og:description" />
  <meta content="assets/images/famhack-logo.png" property="og:image" />
  <meta property="og:type" content="website" />
  <meta content="summary_large_image" name="twitter:card" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <link
    href="https://cdn.prod.website-files.com/68119c56d372e6b9ce8c1be9/css/light-and-shade.webflow.shared.cda0b8f27.min.css"
    rel="stylesheet" type="text/css" />
  <link href="assets/css/famhack.css" rel="stylesheet" type="text/css" />
  <style>
    html.w-mod-js:not(.w-mod-ix3) :is(.blur) {
      visibility: hidden !important;
    }
  </style>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous" />
  <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
  <script type="text/javascript">WebFont.load({ google: { families: ["Azeret Mono:300,regular,500,600"] } });</script>
  <script
    type="text/javascript">!function (o, c) { var n = c.documentElement, t = " w-mod-"; n.className += t + "js", ("ontouchstart" in o || o.DocumentTouch && c instanceof DocumentTouch) && (n.className += t + "touch") }(window, document);</script>
  <link href="assets/images/famhack-logo.png" rel="shortcut icon" type="image/x-icon" />
  <link href="assets/images/famhack-logo.png" rel="apple-touch-icon" />
  <style>
    #smooth-wrapper {
      height: 100%;
      overflow: hidden;
    }

    #smooth-content {
      will-change: transform;
    }

    body .page-transition-wrapper {
      display: flex;
    }
  </style>
</head>

<body>
  <div id="coming-soon-overlay" class="coming-soon-overlay" hidden>
    <div class="coming-soon-content">
      <h1 class="coming-soon-heading">Coming Soon</h1>
      <p class="coming-soon-subheading">Unlocks 14 March 2026</p>
      <a href="/" class="coming-soon-link">← Back to Home</a>
    </div>
  </div>
  <!-- Page Transition -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=68119c56d372e6b9ce8c1be9"
    type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
    crossorigin="anonymous"></script>
  <script src="https://cdn.prod.website-files.com/68119c56d372e6b9ce8c1be9/js/webflow.schunk.36b8fb49256177c8.js"
    type="text/javascript"></script>
  <script src="https://cdn.prod.website-files.com/68119c56d372e6b9ce8c1be9/js/webflow.schunk.970799aa5441a9e1.js"
    type="text/javascript"></script>
  <script src="https://cdn.prod.website-files.com/68119c56d372e6b9ce8c1be9/js/webflow.schunk.585f901539a2f608.js"
    type="text/javascript"></script>
  <script src="https://cdn.prod.website-files.com/gsap/3.14.2/gsap.min.js" type="text/javascript"></script>
  <script src="https://cdn.prod.website-files.com/gsap/3.14.2/ScrollTrigger.min.js" type="text/javascript"></script>
  <script src="https://cdn.prod.website-files.com/gsap/3.14.2/ScrollSmoother.min.js" type="text/javascript"></script>
  <script type="text/javascript">gsap.registerPlugin(ScrollTrigger, ScrollSmoother);</script>

  <script>
    const toggleScroll = (isOpen) => { gsap.set(document.body, { overflow: isOpen ? "hidden" : "" }); };
    const flyoutMenu = document.querySelector(".flyout-menu");
    if (flyoutMenu) {
      new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === "attributes") {
            toggleScroll(getComputedStyle(flyoutMenu).display === "grid");
          }
        });
      }).observe(flyoutMenu, { attributes: true, attributeFilter: ["style", "class"] });
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const transitionEl = document.querySelector(".page-transition-wrapper");
      let transitionTimeline;
      if (window.self !== window.top && transitionEl) { gsap.set(transitionEl, { display: "none" }); return; }
      function createTransitionTimeline() {
        if (!transitionEl) return;
        transitionTimeline = gsap.timeline({ paused: true, onComplete: () => { if (transitionTimeline.reversed()) gsap.set(transitionEl, { display: "none" }); } });
        transitionTimeline.to(transitionEl, { rowGap: "400vh", duration: 0.6, ease: "power2.inOut" });
      }
      function animateIn() {
        if (transitionEl) {
          gsap.set(transitionEl, { display: "flex", rowGap: "0vh", willChange: "rowGap" });
          createTransitionTimeline();
          requestAnimationFrame(() => transitionTimeline.play());
          setTimeout(() => gsap.set(transitionEl, { display: "none" }), 1000);
        }
      }
      window.addEventListener("pageshow", () => animateIn());
      document.querySelectorAll("a[href]:not([target='_blank']):not([href^='#'])").forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          const url = this.href;
          if (transitionEl) {
            gsap.set(transitionEl, { display: "flex", rowGap: "400vh" });
            if (!transitionTimeline) createTransitionTimeline();
            transitionTimeline.reverse();
            transitionTimeline.eventCallback("onReverseComplete", () => { window.location.href = url; });
          } else { window.location.href = url; }
        });
      });
    });
  </script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
      const smoothWrapper = document.querySelector(".smooth-wrapper");
      const smoothContent = document.querySelector(".smooth-content");
      if (smoothWrapper && smoothContent) {
        ScrollSmoother.create({ wrapper: ".smooth-wrapper", content: ".smooth-content", smooth: 1.2, smoothTouch: true, effects: true });
      }
    });
  </script>

  <script type="module" src="assets/js/famhack.js"></script>
</body>

</html>
