<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Web Experience</title>

    <!-- External Libraries via CDN for single-file functionality -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <style>
        :root {
            --bg-peal: rgba(255, 255, 255, 0.1);
            /* non-blurred fallback */
            --dock-bg: rgba(20, 20, 20, 0.3);
            --menu-bg: rgba(20, 20, 20, 0.3);
            --window-bg: rgba(30, 30, 32, 0.85);
            --window-header: #2d2d2d;
            --text-color: #ffffff;
            --accent: #007aff;
            --system-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: var(--system-font);
            color: var(--text-color);
            /* Default wallpaper */
            background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            animation: none;
            cursor: default;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* --- Boot Screen --- */
        #power-on-screen {
            position: fixed;
            inset: 0;
            background: #06070a;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .power-on-button {
            width: 84px;
            height: 84px;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: #fc2f20;
            font-size: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            transition: transform 0.14s ease;
        }

        .power-on-button:hover {
            color: #fc2f20;
            transform: scale(1.08);
        }

        .power-on-button:active {
            color: #fc2f20;
            transform: scale(0.96);
        }

        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out;
        }

        .apple-logo {
            color: white;
            font-size: 80px;
            margin-bottom: 40px;
        }

        .loading-bar {
            width: 200px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: #fff;
            width: 0%;
            border-radius: 3px;
            transition: width 3s ease-in-out;
        }

        #mac-ctf-transition {
            position: fixed;
            inset: 0;
            z-index: 100001;
            display: none;
            pointer-events: none;
            overflow: hidden;
            background: #05070c;
            opacity: 0;
            transition: opacity 0.24s ease;
        }

        #mac-ctf-transition::before,
        #mac-ctf-transition::after {
            content: '';
            position: absolute;
            inset: 0;
        }

        #mac-ctf-transition::before {
            opacity: 0;
            background:
                radial-gradient(circle at center, rgba(5, 7, 12, 0) 0 24%, rgba(5, 7, 12, 0.38) 54%, rgba(5, 7, 12, 0.92) 100%),
                linear-gradient(180deg, rgba(5, 7, 12, 0.22), rgba(5, 7, 12, 0.94));
            transition: opacity 0.42s ease;
        }

        #mac-ctf-transition::after {
            opacity: 0;
            background:
                repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.045) 0 2px, rgba(255, 255, 255, 0) 2px 6px);
            mix-blend-mode: screen;
            transform: translateY(-12%);
            transition: opacity 0.42s ease, transform 0.82s linear;
        }

        .mac-ctf-grid,
        .mac-ctf-noise,
        .mac-ctf-reticle,
        .mac-ctf-ripples,
        .mac-ctf-packets,
        .mac-ctf-beams,
        .mac-ctf-seal,
        .mac-ctf-flash,
        .mac-ctf-slices {
            position: absolute;
            inset: 0;
        }

        .mac-ctf-grid {
            inset: -16% -8%;
            opacity: 0;
            background-image:
                linear-gradient(rgba(252, 47, 32, 0.14) 1px, transparent 1px),
                linear-gradient(90deg, rgba(252, 47, 32, 0.1) 1px, transparent 1px),
                linear-gradient(180deg, rgba(72, 184, 255, 0.08), rgba(72, 184, 255, 0));
            background-size: 100% 84px, 88px 100%, 100% 100%;
            transform-origin: center bottom;
            transform: perspective(1080px) rotateX(82deg) translateY(22%);
            transition: opacity 0.34s ease, transform 1.08s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mac-ctf-noise {
            inset: -10%;
            opacity: 0;
            background:
                radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.1) 0 1px, transparent 1.4px) 0 0 / 18px 18px,
                radial-gradient(circle at 74% 34%, rgba(252, 47, 32, 0.14) 0 1px, transparent 1.5px) 0 0 / 22px 22px,
                radial-gradient(circle at 48% 68%, rgba(72, 184, 255, 0.1) 0 1px, transparent 1.5px) 0 0 / 20px 20px;
            mix-blend-mode: screen;
            animation: ctfSignalNoise 0.56s linear infinite;
            transition: opacity 0.28s ease;
        }

        .mac-ctf-reticle {
            display: grid;
            place-items: center;
            opacity: 0;
            transform: scale(0.88);
            transition: opacity 0.36s ease, transform 1.02s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mac-ctf-reticle-ring {
            position: relative;
            width: min(34vmin, 360px);
            aspect-ratio: 1;
            border-radius: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            clip-path: polygon(12% 0, 88% 0, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0 88%, 0 12%);
            box-shadow: inset 0 0 0 1px rgba(252, 47, 32, 0.12), 0 0 56px rgba(252, 47, 32, 0.08);
        }

        .mac-ctf-reticle-ring::before,
        .mac-ctf-reticle-ring::after {
            content: '';
            position: absolute;
            border-radius: 0;
            inset: 0;
            clip-path: polygon(12% 0, 88% 0, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0 88%, 0 12%);
        }

        .mac-ctf-reticle-ring::before {
            inset: 12%;
            border: 1px dashed rgba(72, 184, 255, 0.28);
            animation: ctfReticleSpin 8s linear infinite;
        }

        .mac-ctf-reticle-ring::after {
            inset: 30%;
            border: 1px solid rgba(255, 245, 220, 0.24);
            box-shadow: 0 0 20px rgba(255, 245, 220, 0.05);
        }

        .mac-ctf-reticle-core,
        .mac-ctf-reticle-crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .mac-ctf-reticle-core {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 1px solid rgba(255, 245, 220, 0.42);
            background:
                linear-gradient(180deg, rgba(255, 245, 220, 0.96), rgba(252, 47, 32, 0.68));
            box-shadow: 0 0 24px rgba(252, 47, 32, 0.18);
        }

        .mac-ctf-reticle-crosshair {
            opacity: 0.56;
        }

        .mac-ctf-reticle-crosshair-h {
            width: min(42vmin, 460px);
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 245, 220, 0.16) 18%, rgba(252, 47, 32, 0.32) 50%, rgba(255, 245, 220, 0.16) 82%, rgba(255, 255, 255, 0) 100%);
        }

        .mac-ctf-reticle-crosshair-v {
            width: 1px;
            height: min(42vmin, 460px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 245, 220, 0.14) 18%, rgba(72, 184, 255, 0.28) 50%, rgba(255, 245, 220, 0.14) 82%, rgba(255, 255, 255, 0) 100%);
        }

        .mac-ctf-ripples {
            display: grid;
            place-items: center;
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        .mac-ctf-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(18vmin, 220px);
            aspect-ratio: 1;
            border-radius: 0;
            clip-path: polygon(12% 0, 88% 0, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0 88%, 0 12%);
            border: 1px solid rgba(255, 245, 220, 0.16);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.4);
            box-shadow: 0 0 32px rgba(252, 47, 32, 0.08);
            transition: opacity 0.24s ease, transform 0.92s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mac-ctf-ripple:nth-child(2) {
            width: min(28vmin, 340px);
            transition-delay: 0.06s;
        }

        .mac-ctf-ripple:nth-child(3) {
            width: min(38vmin, 460px);
            transition-delay: 0.12s;
        }

        .mac-ctf-packets {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mac-ctf-packet {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(18vmin, 220px);
            height: 6px;
            border-radius: 999px;
            opacity: 0;
            filter: blur(1px);
            background:
                linear-gradient(90deg, rgba(252, 47, 32, 0) 0%, rgba(252, 47, 32, 0.24) 12%, rgba(252, 47, 32, 0.86) 36%, rgba(255, 245, 220, 0.98) 50%, rgba(72, 184, 255, 0.6) 68%, rgba(72, 184, 255, 0.14) 86%, rgba(72, 184, 255, 0) 100%);
            box-shadow: 0 0 26px rgba(252, 47, 32, 0.14);
            transform: translate(-50%, -50%) rotate(var(--packet-rotate, 0deg)) translateX(var(--packet-start)) scaleX(0.72);
            transition: transform 1.06s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.24s ease, filter 0.82s ease;
        }

        .mac-ctf-packet:nth-child(1) {
            --packet-rotate: 0deg;
            --packet-start: -34vmin;
            --packet-arm: -20vmin;
            --packet-live: -8vmin;
            --packet-burst: -2vmin;
            transition-delay: 0.04s;
        }

        .mac-ctf-packet:nth-child(2) {
            --packet-rotate: 0deg;
            --packet-start: 34vmin;
            --packet-arm: 20vmin;
            --packet-live: 8vmin;
            --packet-burst: 2vmin;
            transition-delay: 0.08s;
        }

        .mac-ctf-packet:nth-child(3) {
            --packet-rotate: 90deg;
            --packet-start: -34vmin;
            --packet-arm: -20vmin;
            --packet-live: -8vmin;
            --packet-burst: -2vmin;
            transition-delay: 0.12s;
        }

        .mac-ctf-packet:nth-child(4) {
            --packet-rotate: 90deg;
            --packet-start: 34vmin;
            --packet-arm: 20vmin;
            --packet-live: 8vmin;
            --packet-burst: 2vmin;
            transition-delay: 0.16s;
        }

        .mac-ctf-packet:nth-child(5) {
            --packet-rotate: 45deg;
            --packet-start: -28vmin;
            --packet-arm: -16vmin;
            --packet-live: -7vmin;
            --packet-burst: -1vmin;
            transition-delay: 0.2s;
        }

        .mac-ctf-packet:nth-child(6) {
            --packet-rotate: 45deg;
            --packet-start: 28vmin;
            --packet-arm: 16vmin;
            --packet-live: 7vmin;
            --packet-burst: 1vmin;
            transition-delay: 0.24s;
        }

        .mac-ctf-packet:nth-child(7) {
            --packet-rotate: -45deg;
            --packet-start: -28vmin;
            --packet-arm: -16vmin;
            --packet-live: -7vmin;
            --packet-burst: -1vmin;
            transition-delay: 0.28s;
        }

        .mac-ctf-packet:nth-child(8) {
            --packet-rotate: -45deg;
            --packet-start: 28vmin;
            --packet-arm: 16vmin;
            --packet-live: 7vmin;
            --packet-burst: 1vmin;
            transition-delay: 0.32s;
        }

        .mac-ctf-flash {
            inset: -14%;
            opacity: 0;
            background:
                radial-gradient(circle at center, rgba(255, 245, 220, 0.68) 0 6%, rgba(252, 47, 32, 0.44) 14%, rgba(58, 18, 100, 0.2) 22%, rgba(5, 7, 12, 0) 44%);
            filter: blur(18px);
            transform: scale(0.26);
            transition: opacity 0.34s ease, transform 1.02s cubic-bezier(0.16, 1, 0.3, 1), filter 1.02s ease;
        }

        .mac-ctf-beams {
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        .mac-ctf-beam {
            position: absolute;
            top: 50%;
            left: 50%;
            opacity: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(252, 47, 32, 0) 0%, rgba(252, 47, 32, 0.72) 24%, rgba(255, 245, 220, 0.98) 50%, rgba(72, 184, 255, 0.62) 76%, rgba(72, 184, 255, 0) 100%);
            box-shadow: 0 0 18px rgba(252, 47, 32, 0.24), 0 0 42px rgba(72, 184, 255, 0.1);
            transition: opacity 0.24s ease, transform 1.16s cubic-bezier(0.16, 1, 0.3, 1), filter 1s ease;
        }

        .mac-ctf-beam.is-horizontal {
            width: min(54vmin, 680px);
            height: 2px;
            transform: translate(-50%, -50%) rotate(var(--beam-rotate, 0deg)) translateX(var(--beam-start, 0)) scaleX(0.22);
        }

        .mac-ctf-beam.is-vertical {
            width: 2px;
            height: min(54vmin, 680px);
            background: linear-gradient(180deg, rgba(252, 47, 32, 0) 0%, rgba(252, 47, 32, 0.72) 24%, rgba(255, 245, 220, 0.98) 50%, rgba(72, 184, 255, 0.62) 76%, rgba(72, 184, 255, 0) 100%);
            transform: translate(-50%, -50%) translateY(var(--beam-start, 0)) scaleY(0.22);
        }

        .mac-ctf-beam-left {
            --beam-start: -30vmin;
            --beam-arm: -16vmin;
            --beam-live: -4vmin;
            --beam-burst: -1vmin;
            --beam-rotate: 0deg;
        }

        .mac-ctf-beam-right {
            --beam-start: 30vmin;
            --beam-arm: 16vmin;
            --beam-live: 4vmin;
            --beam-burst: 1vmin;
            --beam-rotate: 0deg;
        }

        .mac-ctf-beam-top {
            --beam-start: -30vmin;
            --beam-arm: -16vmin;
            --beam-live: -4vmin;
            --beam-burst: -1vmin;
        }

        .mac-ctf-beam-bottom {
            --beam-start: 30vmin;
            --beam-arm: 16vmin;
            --beam-live: 4vmin;
            --beam-burst: 1vmin;
        }

        .mac-ctf-seal {
            opacity: 0;
            background:
                radial-gradient(circle at center, rgba(252, 47, 32, 0.24) 0 16%, rgba(72, 184, 255, 0.08) 24%, rgba(5, 7, 12, 0) 42%),
                linear-gradient(180deg, rgba(5, 7, 12, 0.08), rgba(5, 7, 12, 0.98));
            clip-path: inset(49% 0 49% 0 round 22px);
            filter: blur(12px);
            transform: scaleX(0.9);
            transition: opacity 0.22s ease, clip-path 0.82s cubic-bezier(0.16, 1, 0.3, 1), filter 0.82s ease, transform 0.82s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mac-ctf-slices {
            overflow: hidden;
        }

        .mac-ctf-slice {
            position: absolute;
            left: -8%;
            width: 116%;
            height: 9vh;
            opacity: 0;
            filter: blur(10px);
            will-change: transform, opacity, filter;
            background:
                linear-gradient(90deg, rgba(252, 47, 32, 0) 0%, rgba(252, 47, 32, 0.18) 12%, rgba(252, 47, 32, 0.92) 36%, rgba(255, 241, 205, 0.98) 50%, rgba(72, 184, 255, 0.74) 64%, rgba(72, 184, 255, 0.18) 88%, rgba(72, 184, 255, 0) 100%),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 2px, transparent 2px 14px);
            mix-blend-mode: screen;
            transform: translate3d(var(--start-x, -12%), 0, 0) scaleX(0.74) skewX(var(--skew, -18deg));
            transition: transform 0.92s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.16s ease, filter 0.92s ease;
        }

        .mac-ctf-slice:nth-child(1) {
            top: 11%;
            --start-x: -18%;
            --skew: -14deg;
            --glitch-skew: -7deg;
            --slice-drift: -2px;
            transition-delay: 0.03s;
        }

        .mac-ctf-slice:nth-child(2) {
            top: 24%;
            height: 8vh;
            --start-x: 14%;
            --skew: 11deg;
            --glitch-skew: 5deg;
            --slice-drift: 3px;
            transition-delay: 0.07s;
        }

        .mac-ctf-slice:nth-child(3) {
            top: 37%;
            height: 11vh;
            --start-x: -12%;
            --skew: -10deg;
            --glitch-skew: -4deg;
            --slice-drift: -4px;
            transition-delay: 0.11s;
        }

        .mac-ctf-slice:nth-child(4) {
            top: 50%;
            height: 9vh;
            --start-x: 16%;
            --skew: 15deg;
            --glitch-skew: 7deg;
            --slice-drift: 4px;
            transition-delay: 0.16s;
        }

        .mac-ctf-slice:nth-child(5) {
            top: 63%;
            height: 8vh;
            --start-x: -14%;
            --skew: -12deg;
            --glitch-skew: -5deg;
            --slice-drift: -3px;
            transition-delay: 0.21s;
        }

        .mac-ctf-slice:nth-child(6) {
            top: 76%;
            height: 10vh;
            --start-x: 12%;
            --skew: 10deg;
            --glitch-skew: 4deg;
            --slice-drift: 2px;
            transition-delay: 0.26s;
        }

        #mac-ctf-transition.is-active {
            opacity: 1;
        }

        #mac-ctf-transition.is-active::before {
            opacity: 1;
        }

        #mac-ctf-transition.is-active::after {
            opacity: 0.14;
            transform: translateY(0);
        }

        #mac-ctf-transition.is-active .mac-ctf-grid {
            opacity: 0.12;
            transform: perspective(1080px) rotateX(78deg) translateY(14%);
        }

        #mac-ctf-transition.is-active .mac-ctf-noise {
            opacity: 0.1;
        }

        #mac-ctf-transition.is-active .mac-ctf-reticle {
            opacity: 0.3;
            transform: scale(0.96);
        }

        #mac-ctf-transition.is-active .mac-ctf-ripples {
            opacity: 0.4;
        }

        #mac-ctf-transition.is-active .mac-ctf-ripple {
            opacity: 0.1;
            transform: translate(-50%, -50%) scale(0.72);
        }

        #mac-ctf-transition.is-active .mac-ctf-packets {
            opacity: 0.2;
        }

        #mac-ctf-transition.is-active .mac-ctf-packet {
            opacity: 0.14;
            transform: translate(-50%, -50%) rotate(var(--packet-rotate)) translateX(var(--packet-start)) scaleX(0.78);
        }

        #mac-ctf-transition.is-active .mac-ctf-flash {
            opacity: 0.18;
            transform: scale(0.62);
            filter: blur(22px);
        }

        #mac-ctf-transition.is-active .mac-ctf-beams {
            opacity: 0.36;
        }

        #mac-ctf-transition.is-active .mac-ctf-beam.is-horizontal {
            opacity: 0.18;
            transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-start)) scaleX(0.34);
        }

        #mac-ctf-transition.is-active .mac-ctf-beam.is-vertical {
            opacity: 0.18;
            transform: translate(-50%, -50%) translateY(var(--beam-start)) scaleY(0.34);
        }

        #mac-ctf-transition.is-arming::before {
            background:
                radial-gradient(circle at center, rgba(252, 47, 32, 0.16) 0 14%, rgba(72, 184, 255, 0.05) 24%, rgba(5, 7, 12, 0) 42%),
                linear-gradient(180deg, rgba(5, 7, 12, 0.18), rgba(5, 7, 12, 0.92));
        }

        #mac-ctf-transition.is-arming::after {
            opacity: 0.28;
        }

        #mac-ctf-transition.is-arming .mac-ctf-grid {
            opacity: 0.22;
            transform: perspective(1080px) rotateX(73deg) translateY(7%);
        }

        #mac-ctf-transition.is-arming .mac-ctf-noise {
            opacity: 0.18;
        }

        #mac-ctf-transition.is-arming .mac-ctf-reticle {
            opacity: 0.72;
            transform: scale(1);
        }

        #mac-ctf-transition.is-arming .mac-ctf-ripples {
            opacity: 0.84;
        }

        #mac-ctf-transition.is-arming .mac-ctf-ripple {
            opacity: 0.18;
            transform: translate(-50%, -50%) scale(0.94);
        }

        #mac-ctf-transition.is-arming .mac-ctf-packets {
            opacity: 1;
        }

        #mac-ctf-transition.is-arming .mac-ctf-packet {
            opacity: 0.38;
            transform: translate(-50%, -50%) rotate(var(--packet-rotate)) translateX(var(--packet-arm)) scaleX(0.9);
        }

        #mac-ctf-transition.is-arming .mac-ctf-flash {
            opacity: 0.32;
            transform: scale(0.88);
            filter: blur(26px);
        }

        #mac-ctf-transition.is-arming .mac-ctf-beams {
            opacity: 0.72;
        }

        #mac-ctf-transition.is-arming .mac-ctf-beam.is-horizontal {
            opacity: 0.42;
            transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-arm)) scaleX(0.72);
        }

        #mac-ctf-transition.is-arming .mac-ctf-beam.is-vertical {
            opacity: 0.42;
            transform: translate(-50%, -50%) translateY(var(--beam-arm)) scaleY(0.72);
        }

        #mac-ctf-transition.is-glitching::before {
            background:
                radial-gradient(circle at center, rgba(252, 47, 32, 0.2) 0 15%, rgba(72, 184, 255, 0.08) 24%, rgba(5, 7, 12, 0) 42%),
                linear-gradient(180deg, rgba(5, 7, 12, 0.18), rgba(5, 7, 12, 0.9));
        }

        #mac-ctf-transition.is-glitching::after {
            opacity: 0.48;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-grid {
            opacity: 0.32;
            transform: perspective(1080px) rotateX(68deg) translateY(3%);
        }

        #mac-ctf-transition.is-glitching .mac-ctf-noise {
            opacity: 0.24;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-reticle {
            opacity: 0.92;
            transform: scale(1.04);
            animation: ctfReticleGlitch 1.02s cubic-bezier(0.22, 1, 0.36, 1) 1 both;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-ripples {
            opacity: 1;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-ripple {
            opacity: 0.26;
            transform: translate(-50%, -50%) scale(1.18);
            animation: ctfRipplePulse 1.36s cubic-bezier(0.16, 1, 0.3, 1) infinite;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-packets {
            opacity: 1;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-packet {
            opacity: 0.64;
            transform: translate(-50%, -50%) rotate(var(--packet-rotate)) translateX(var(--packet-live)) scaleX(1);
            filter: blur(0.4px);
            animation: ctfPacketPulse 0.9s ease-in-out 2 both;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-beams {
            opacity: 1;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-beam.is-horizontal {
            opacity: 0.72;
            transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-live)) scaleX(1);
            animation: ctfAxisPulseX 1.18s cubic-bezier(0.16, 1, 0.3, 1) infinite alternate;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-beam.is-vertical {
            opacity: 0.72;
            transform: translate(-50%, -50%) translateY(var(--beam-live)) scaleY(1);
            animation: ctfAxisPulseY 1.18s cubic-bezier(0.16, 1, 0.3, 1) infinite alternate;
        }

        #mac-ctf-transition.is-glitching .mac-ctf-flash {
            opacity: 0.34;
            transform: scale(1.04);
            filter: blur(34px);
        }

        #mac-ctf-transition.is-glitching .mac-ctf-slice {
            opacity: 0.48;
            filter: blur(8px);
            transform: translate3d(0, var(--slice-drift), 0) scaleX(1.04) skewX(var(--glitch-skew));
            animation: ctfSliceFlicker 0.96s ease-in-out 1 both;
        }

        #mac-ctf-transition.is-sealing::before {
            opacity: 1;
            background:
                radial-gradient(circle at center, rgba(252, 47, 32, 0.18) 0 14%, rgba(5, 7, 12, 0) 38%),
                linear-gradient(180deg, rgba(5, 7, 12, 0.14), rgba(5, 7, 12, 0.98));
        }

        #mac-ctf-transition.is-sealing::after {
            opacity: 0.1;
        }

        #mac-ctf-transition.is-sealing .mac-ctf-grid {
            opacity: 0.08;
            transform: perspective(1080px) rotateX(64deg) translateY(0);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-noise {
            opacity: 0.08;
        }

        #mac-ctf-transition.is-sealing .mac-ctf-reticle {
            opacity: 0.12;
            transform: scale(1.18);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-ripples {
            opacity: 0.16;
        }

        #mac-ctf-transition.is-sealing .mac-ctf-ripple {
            opacity: 0.08;
            transform: translate(-50%, -50%) scale(1.38);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-packets {
            opacity: 0.26;
        }

        #mac-ctf-transition.is-sealing .mac-ctf-packet {
            opacity: 0.16;
            transform: translate(-50%, -50%) rotate(var(--packet-rotate)) translateX(var(--packet-burst)) scaleX(1.08);
            filter: blur(8px);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-beams {
            opacity: 0.18;
        }

        #mac-ctf-transition.is-sealing .mac-ctf-beam.is-horizontal {
            opacity: 0.08;
            transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-burst)) scaleX(1.08);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-beam.is-vertical {
            opacity: 0.08;
            transform: translate(-50%, -50%) translateY(var(--beam-burst)) scaleY(1.08);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-flash {
            opacity: 0.52;
            transform: scale(1.44);
            filter: blur(34px);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-seal {
            opacity: 1;
            clip-path: inset(0 0 0 0 round 0);
            filter: blur(0);
            transform: scaleX(1);
        }

        #mac-ctf-transition.is-sealing .mac-ctf-slice {
            opacity: 0.16;
            filter: blur(18px);
            transform: translate3d(0, 0, 0) scaleX(1.12) skewX(0deg);
        }

        /* --- UI Layout --- */
        #desktop {
            width: 100%;
            height: 100%;
            position: relative;
            transform-origin: center center;
            transition: filter 0.74s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.74s ease, transform 0.74s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.ctf-launching #desktop {
            opacity: 0.72;
            filter: blur(1.2px) brightness(0.52) saturate(1.18) contrast(1.12) drop-shadow(10px 0 0 rgba(252, 47, 32, 0.14)) drop-shadow(-8px 0 0 rgba(72, 184, 255, 0.1));
            animation: ctfDesktopGlitch 0.88s cubic-bezier(0.22, 1, 0.36, 1) 1 both;
        }

        @keyframes ctfDesktopGlitch {
            0% {
                transform: scale(1) translate3d(0, 0, 0);
            }

            18% {
                transform: scale(1.003) translate3d(-2px, 0, 0);
            }

            38% {
                transform: scale(1.007) translate3d(2px, -1px, 0);
            }

            58% {
                transform: scale(1.012) translate3d(-1px, 2px, 0);
            }

            78% {
                transform: scale(1.016) translate3d(2px, 0, 0);
            }

            100% {
                transform: scale(1.02) translate3d(0, 0, 0);
            }
        }

        @keyframes ctfReticleSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes ctfReticleGlitch {
            0%,
            100% {
                transform: scale(1.04) translate3d(0, 0, 0);
            }

            20% {
                transform: scale(1.045) translate3d(-2px, 1px, 0);
            }

            46% {
                transform: scale(1.03) translate3d(2px, -1px, 0);
            }

            72% {
                transform: scale(1.048) translate3d(-1px, 2px, 0);
            }
        }

        @keyframes ctfSignalNoise {
            0% {
                background-position: 0 0, 0 0, 0 0;
            }

            33% {
                background-position: 3px 2px, -2px 2px, 2px -1px;
            }

            66% {
                background-position: 5px 4px, -4px 3px, 3px -2px;
            }

            100% {
                background-position: 8px 6px, -6px 4px, 5px -4px;
            }
        }

        @keyframes ctfPacketPulse {
            0%,
            100% {
                opacity: 0.58;
            }

            50% {
                opacity: 0.8;
            }
        }

        @keyframes ctfRipplePulse {
            0%,
            100% {
                opacity: 0.24;
                transform: translate(-50%, -50%) scale(1.04);
            }

            50% {
                opacity: 0.08;
                transform: translate(-50%, -50%) scale(1.32);
            }
        }

        @keyframes ctfSliceFlicker {
            0%,
            100% {
                opacity: 0.44;
            }

            50% {
                opacity: 0.62;
            }

            74% {
                opacity: 0.54;
            }
        }

        @keyframes ctfAxisPulseX {
            0% {
                transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-live)) scaleX(0.96);
            }

            100% {
                transform: translate(-50%, -50%) rotate(var(--beam-rotate)) translateX(var(--beam-live)) scaleX(1.02);
            }
        }

        @keyframes ctfAxisPulseY {
            0% {
                transform: translate(-50%, -50%) translateY(var(--beam-live)) scaleY(0.96);
            }

            100% {
                transform: translate(-50%, -50%) translateY(var(--beam-live)) scaleY(1.02);
            }
        }

        /* Menu Bar */
        #menubar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 30px;
            background: var(--menu-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 5000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-left,
        .menu-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 2px 8px;
            margin: -2px -8px;
        }

        .apple-icon {
            font-size: 16px;
        }

        #active-app-name {
            font-weight: 700;
        }

        /* Dock */
        #dock-container {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 6000;
        }

        #dock {
            background: var(--dock-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 70px;
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .dock-item {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            cursor: pointer;
        }

        /* SVG Icon Styles */
        .dock-icon-svg {
            width: 100%;
            height: 100%;
            border-radius: 14px;
        }

        .dock-item:hover {
            transform: scale(1.2) translateY(-10px);
            margin: 0 5px;
        }

        .dock-dot {
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute;
            bottom: -8px;
            display: none;
        }

        .dock-item.active .dock-dot {
            display: block;
        }

        /* Bounce Animation */
        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .bouncing {
            animation: bounce 0.6s ease infinite;
        }

        /* --- Windows System --- */
        .window {
            position: absolute;
            background: var(--window-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
            min-height: 200px;
            transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
            transform-origin: center;
        }

        /* Window opening animation */
        .window.opening {
            animation: winOpen 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes winOpen {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Inactive window state */
        .window.inactive {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .window.inactive .traffic-lights span {
            background-color: #555 !important;
            color: #555 !important;
        }

        .window-header {
            height: 30px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            position: relative;
            cursor: grab;
        }

        .window-header:active {
            cursor: grabbing;
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
            margin-left: 12px;
            z-index: 2;
        }

        .t-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8px;
            color: transparent;
            transition: 0.1s;
            cursor: default;
        }

        .traffic-lights:hover .t-btn {
            color: rgba(0, 0, 0, 0.6);
        }

        .close-btn {
            background: #ff5f56;
        }

        .min-btn {
            background: #ffbd2e;
        }

        .max-btn {
            background: #27c93f;
        }

        .window-title {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        .window-content {
            flex: 1;
            overflow: auto;
            position: relative;
            user-select: text;
            /* Allow text selection inside apps */
        }

        /* jQuery UI Resizable Handle Fix */
        .ui-resizable-se {
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            background: none;
        }

        /* --- Context Menu --- */
        #context-menu {
            position: absolute;
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px 0;
            width: 180px;
            display: none;
            z-index: 99999;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .ctx-item {
            padding: 6px 15px;
            font-size: 13px;
            cursor: default;
            display: flex;
            justify-content: space-between;
        }

        .ctx-item:hover {
            background: var(--accent);
            color: white;
        }

        .ctx-hr {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 4px 0;
        }

        /* --- APP SPECIFIC STYLES --- */

        /* Finder */
        .finder-layout {
            display: flex;
            height: 100%;
            background: #1e1e1e;
            color: #ddd;
        }

        .finder-sidebar {
            width: 140px;
            background: rgba(50, 50, 50, 0.3);
            padding: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sidebar-item {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-item i {
            color: var(--accent);
            width: 15px;
            text-align: center;
        }

        .finder-main {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .finder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .file-icon {
            font-size: 40px;
            color: #5dade2;
            margin-bottom: 5px;
        }

        .file-icon.folder {
            color: #5dade2;
        }

        .file-icon.text {
            color: #ddd;
        }

        .file-icon.img {
            color: #58d68d;
        }

        .file-icon.launcher {
            color: #fc5a4c;
        }

        .file-name {
            font-size: 12px;
            word-break: normal;
            overflow-wrap: normal;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .file-item:hover .file-name {
            background: var(--accent);
        }

        /* Terminal */
        .terminal-app {
            background: #101010;
            color: #33ff00;
            font-family: 'Courier New', monospace;
            padding: 10px;
            height: 100%;
            overflow-y: auto;
            font-size: 13px;
        }

        .term-line {
            margin-bottom: 2px;
            line-height: 1.4;
        }

        .term-input-line {
            display: flex;
        }

        .term-prompt {
            color: #00bfff;
            margin-right: 8px;
        }

        #term-input {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: inherit;
            font-size: inherit;
            flex: 1;
            outline: none;
        }

        /* TextEdit */
        .textedit-app {
            background: #2d2d2d;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .text-toolbar {
            padding: 5px;
            background: #3a3a3a;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 5px;
        }

        .text-tool {
            padding: 4px 8px;
            background: #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #text-area {
            flex: 1;
            background: #1e1e1e;
            color: #eee;
            border: none;
            padding: 15px;
            font-family: var(--system-font);
            font-size: 14px;
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        #text-rich-area {
            flex: 1;
            background: #1e1e1e;
            color: #eee;
            padding: 15px;
            font-family: var(--system-font);
            font-size: 14px;
            line-height: 1.6;
            overflow: auto;
            white-space: pre-wrap;
            user-select: text;
        }

        #text-rich-area strong {
            color: #fff;
            font-weight: 700;
        }

        /* Sketch (Paint) */
        .paint-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fff;
        }

        .paint-toolbar {
            padding: 8px;
            background: #f0f0f0;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 10px;
            align-items: center;
            color: #333;
        }

        #paint-canvas {
            background: white;
            cursor: crosshair;
            touch-action: none;
            flex: 1;
            display: block;
        }

        /* Calculator */
        .calc-app {
            background: #333;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #calc-display {
            background: transparent;
            color: white;
            font-size: 36px;
            text-align: right;
            border: none;
            width: 100%;
            margin-bottom: 10px;
            outline: none;
            font-weight: 300;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex: 1;
        }

        .calc-btn {
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: filter 0.1s;
            color: white;
        }

        .calc-btn:active {
            filter: brightness(1.2);
        }

        .c-num {
            background: #555;
        }

        .c-op {
            background: #ff9f0a;
            font-size: 22px;
            padding-top: 3px;
        }

        .c-top {
            background: #a5a5a5;
            color: black;
        }

        .c-zero {
            grid-column: span 2;
            border-radius: 30px;
            text-align: left;
            padding-left: 25px;
        }

        /* Safari */
        .safari-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fff;
        }

        .safari-bar {
            padding: 8px;
            background: #f0f0f0;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .url-bar {
            flex: 1;
            background: #ddd;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            color: #333;
            outline: none;
        }

        .safari-frame {
            flex: 1;
            border: none;
            width: 100%;
            background: white;
        }

        /* Studio (Video) */
        .studio-app {
            background: #000;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .video-stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #main-video {
            max-width: 100%;
            max-height: 100%;
        }

        .studio-controls {
            height: 80px;
            background: #1a1a1a;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filters-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 4px 10px;
            background: #333;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid #444;
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .playback-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #ddd;
        }

        /* Settings */
        .settings-app {
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .wall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }

        .wall-thumb {
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .wall-thumb:hover {
            transform: scale(1.02);
        }

        .wall-thumb.selected {
            border-color: var(--accent);
        }

        /* SVGs for Icons (Data URIs for single file) */
        /* Using generated geometric gradients to look like modern macOS icons */
        .icon-finder {
            background: linear-gradient(180deg, #e3e3e3 0%, #c7c7c7 100%);
            position: relative;
            overflow: hidden;

        .icon-finder::after {

<body>

    <!-- Desktop Environment -->
