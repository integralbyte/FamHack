<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>About | FamHack</title>
  <meta
    name="description"
    content="The About page is locked until 14 March 2026 while the FamHack pre-launch site is live." />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(252, 47, 32, 0.12), transparent 34%),
        #0d0d0d;
      color: #ffe9ce;
      font-family: "Azeret Mono", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .locked-shell {
      width: min(640px, 100%);
      padding: 48px;
      border: 1px solid rgba(255, 233, 206, 0.14);
      background: rgba(8, 8, 8, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    .locked-shell-eyebrow {
      margin: 0 0 14px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fc2f20;
    }

    .locked-shell-heading {
      margin: 0 0 18px;
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      font-weight: 700;
      line-height: 1.04;
      text-transform: uppercase;
    }

    .locked-shell-copy {
      max-width: 42ch;
      margin: 0 auto;
      font-size: 0.92rem;
      line-height: 1.85;
      color: rgba(255, 233, 206, 0.72);
    }

    .locked-shell-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .locked-shell-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid rgba(255, 233, 206, 0.18);
      color: #ffe9ce;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
    }

    @media (max-width: 767px) {
      .locked-shell {
        padding: 36px 22px;
      }

      .locked-shell-actions {
        flex-direction: column;
      }

      .locked-shell-link {
        width: 100%;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link
    href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="assets/css/famhack.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <main class="locked-shell" aria-labelledby="locked-shell-title">
    <p class="locked-shell-eyebrow">About</p>
    <h1 id="locked-shell-title" class="locked-shell-heading">Coming Soon</h1>
    <p class="locked-shell-copy">
      This page unlocks on 14 March 2026. The public pre-launch site only exposes registration right now.
    </p>
    <div class="locked-shell-actions">
      <a href="/" class="locked-shell-link">Back to home</a>
      <a href="/register" class="locked-shell-link">Register now</a>
    </div>
  </main>
</body>
</html>
